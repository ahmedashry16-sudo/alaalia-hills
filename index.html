<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Tajawal', Arial, sans-serif;
    background: linear-gradient(135deg, #062830 0%, #0d4a52 60%, #155f6a 100%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .splash {
    text-align: center;
    color: white;
    padding: 40px 20px;
    animation: fadeIn .5s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  p { font-size: 14px; opacity: 0.7; margin-bottom: 30px; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(184,149,58,.3);
    border-top-color: #b8953a;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { font-size: 13px; opacity: 0.6; margin-top: 16px; }
</style>
